# Production compose file for the single-VPS deploy described in
# DEPLOYMENT.md §3.5. Pull images from GHCR; the build workflow that
# produces them is tracked separately (DEPLOYMENT.md §6.1, not part of
# this work order).
#
# Run from /srv/ekonaryn on the VPS:
#   docker compose --env-file .env.production -f docker-compose.prod.yml pull
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d
#
# GHCR_OWNER and IMAGE_TAG come from .env.production (see .env.example).
# IMAGE_TAG defaults to `latest`; for a SHA-pinned deploy set it via
# .env.deploy as documented in DEPLOYMENT.md §8.2.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [caddy_net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GHCR_OWNER}/ekonaryn-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    networks: [caddy_net]
    expose: ['4000']

  website:
    image: ghcr.io/${GHCR_OWNER}/ekonaryn-website:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    depends_on: [api]
    networks: [caddy_net]
    expose: ['3000']

  dashboard:
    image: ghcr.io/${GHCR_OWNER}/ekonaryn-dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    depends_on: [api]
    networks: [caddy_net]
    expose: ['3001']

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # The api uploads volume is mounted READ-ONLY here so Caddy can
      # serve /uploads/* directly via file_server (DEPLOYMENT.md §3.6),
      # bypassing the Express /uploads static handler entirely.
      - api_uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [caddy_net]
    depends_on: [api, website, dashboard]

networks:
  caddy_net:
    name: caddy_net

volumes:
  postgres_data:
  api_uploads:
  caddy_data:
  caddy_config:
