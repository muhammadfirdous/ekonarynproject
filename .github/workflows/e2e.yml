name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      # The api server boots via Playwright's webServer block and reads
      # CORS_ORIGINS at request time. Without it, Task 3's allowlist
      # rejects the dashboard's POST /auth/login from Origin
      # http://localhost:3001 and every UI test fails on the redirect.
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      CI: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build workspace deps (api dev server resolves @ekonaryn/db via dist)
        run: |
          npm run build --workspace=@ekonaryn/shared
          npm run build --workspace=@ekonaryn/db

      - name: Apply schema to the Postgres test DB (e2e globalSetup re-seeds)
        run: npm run db:push --workspace=@ekonaryn/db

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright's webServer block boots api/dashboard/website itself; it
      # waits on /health and the two web ports before starting the spec run.
      - name: Run E2E suite
        run: npm run e2e

      - name: Upload HTML report (always — useful even on success for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload traces / screenshots from failed runs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
