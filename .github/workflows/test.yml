name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR/branch.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma client (api/dashboard imports rely on this)
        run: npm run db:generate

      - name: Lint
        run: npm run lint

  shared:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run shared package tests with coverage
        run: npm test --workspace=@ekonaryn/shared -- --coverage

  api:
    needs: lint
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - name: Run API tests with coverage (Jest, maxWorkers:1 — SQLite is serial)
        run: npm test --workspace=@ekonaryn/api -- --coverage

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: packages/api/coverage/
          if-no-files-found: ignore
          retention-days: 14

  dashboard:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - name: Run dashboard tests with coverage (Vitest)
        run: npm test --workspace=@ekonaryn/dashboard -- --coverage

      - name: Upload dashboard coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage/
          if-no-files-found: ignore
          retention-days: 14

  website:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run website tests with coverage (Vitest)
        run: npm test --workspace=@ekonaryn/website -- --coverage

      - name: Upload website coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-coverage
          path: apps/website/coverage/
          if-no-files-found: ignore
          retention-days: 14
