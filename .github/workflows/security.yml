name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC sweep so deps audit catches advisories that
    # land between PRs.
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # We only fail on production-dep advisories (high or critical). Dev-dep
      # advisories (eslint plugins, vitest internals, etc.) are noisy and
      # rarely actionable on a Friday.
      - name: npm audit (production deps, high+critical only)
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan past commits.
          fetch-depth: 0

      # gitleaks is a single static binary, fast and deterministic. The official
      # action pulls the latest tagged release.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-security-suite:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate

      - name: Build workspace deps (jest resolves @ekonaryn/db and @ekonaryn/shared via dist)
        run: |
          npm run build --workspace=@ekonaryn/shared
          npm run build --workspace=@ekonaryn/db

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
        working-directory: packages/db

      # Run only the security-focused subset (Phase 8). This is what guards
      # against auth bypass / IDOR / mass-assignment / injection regressions.
      - name: API security/contract/migration tests
        run: npm test --workspace=@ekonaryn/api -- tests/security
