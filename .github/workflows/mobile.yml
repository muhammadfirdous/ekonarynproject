name: Mobile (Android JVM tests)

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile.yml'

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # JDK 17 — Robolectric 4.15.1 + AGP 8.2.2 are tested against this matrix.
      # Local dev machines may be on JDK 24; the gradle wrapper bump from 8.4 →
      # 8.14.3 (Phase 1) makes both work, but CI sticks with 17 for lockstep.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/**/*.gradle*', 'apps/mobile/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run JVM unit tests (Robolectric + MockWebServer)
        run: ./gradlew testDebugUnitTest --stacktrace

      # Compile-only sweep for the Espresso instrumented sourceset. We can't
      # *run* connectedDebugAndroidTest here without an emulator, but compiling
      # them catches drift between the production code and the spec files.
      - name: Compile-check androidTest sourceset (Espresso specs)
        run: ./gradlew compileDebugAndroidTestSources

      - name: Upload JVM test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-report
          path: apps/mobile/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14
